name: Maven Snapshot build
on:
  push:
    branches:
      - '2022.06.x'
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Build SNAPSHOT with Apache Maven
        run: mvn --batch-mode verify
