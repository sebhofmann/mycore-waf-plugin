name: Maven Snapshot deploy
on:
  push:
    branches:
      - 'master'
      - '*.x'
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Determine Java version
        id: java-version
        run: |
          if [[ "${{ github.ref_name }}" == "master" ]]; then
            echo "version=25" >> $GITHUB_OUTPUT
          else
            echo "version=21" >> $GITHUB_OUTPUT
          fi
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ steps.java-version.outputs.version }}
          distribution: 'temurin'
          server-id: 'central'
          server-username: SONATYPE_USERNAME
          server-password: SONATYPE_TOKEN
      - name: Publish SNAPSHOT to sonatype-central with Apache Maven
        env:
          SONATYPE_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          SONATYPE_TOKEN: ${{ secrets.OSSRH_TOKEN }}
        run: mvn --batch-mode deploy
