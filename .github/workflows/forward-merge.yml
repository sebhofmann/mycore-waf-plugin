name: Forward-Merge

on:
  push:
    branches:
      - '[0-9][0-9][0-9][0-9].[0-9][0-9].x'

jobs:
  forward-merge:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine target branch
        id: target
        env:
          SOURCE: ${{ github.ref_name }}
        run: |
          ALL_VERSIONS=$(git branch -r \
            | grep -oE 'origin/[0-9]{4}\.[0-9]{2}\.x$' \
            | sed 's|origin/||' \
            | sort -V)

          NEXT=$(echo "$ALL_VERSIONS" | awk -v cur="$SOURCE" '
            $0 == cur { found=1; next }
            found { print; exit }
          ')

          if [ -z "$NEXT" ]; then
            TARGET="main"
          else
            TARGET="$NEXT"
          fi

          echo "Source: $SOURCE -> Target: $TARGET"
          echo "source=$SOURCE" >> "$GITHUB_OUTPUT"
          echo "target=$TARGET" >> "$GITHUB_OUTPUT"

      - name: Build PR body
        id: body
        env:
          SOURCE: ${{ steps.target.outputs.source }}
          TARGET: ${{ steps.target.outputs.target }}
        run: |
          git fetch --quiet origin "$SOURCE" "$TARGET"

          COMMITS=$(git log --pretty=format:'* %h %s' "origin/${TARGET}..origin/${SOURCE}")
          if [ -z "$COMMITS" ]; then
            COMMITS="_(keine neuen Commits)_"
          fi

          {
            echo 'body<<__PR_BODY_EOF__'
            echo "Merge branch \`${SOURCE}\` into \`${TARGET}\`"
            echo
            echo "## Commits"
            echo
            echo "$COMMITS"
            echo '__PR_BODY_EOF__'
          } >> "$GITHUB_OUTPUT"

      - name: Create or update PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SOURCE: ${{ steps.target.outputs.source }}
          TARGET: ${{ steps.target.outputs.target }}
          PR_TITLE: "Merge branch '${{ steps.target.outputs.source }}' into ${{ steps.target.outputs.target }}"
          PR_BODY: ${{ steps.body.outputs.body }}
        run: |
          EXISTING=$(gh pr list --base "$TARGET" --head "$SOURCE" --state open --json number --jq '.[0].number')
          if [ -n "$EXISTING" ]; then
            echo "PR #$EXISTING bereits offen, aktualisiere Body."
            gh pr edit "$EXISTING" --title "$PR_TITLE" --body "$PR_BODY"
            exit 0
          fi

          NEW_PR=$(gh pr create --base "$TARGET" --head "$SOURCE" \
            --title "$PR_TITLE" \
            --body "$PR_BODY")

          NEW_NUM=$(echo "$NEW_PR" | grep -oE '[0-9]+$')

          COMMENT=$(printf '%s\n' \
            "Konflikte lokal lösen:" \
            '```' \
            "git checkout ${TARGET}" \
            "git pull" \
            "git merge --no-commit --no-ff origin/${SOURCE}" \
            "# Konflikte fixen, dann:" \
            "git commit" \
            "git push" \
            '```')

          gh pr comment "$NEW_NUM" --body "$COMMENT"
