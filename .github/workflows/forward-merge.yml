name: Forward-Merge

on:
  push:
    branches:
      - '[0-9][0-9][0-9][0-9].[0-9][0-9].x'

jobs:
  forward-merge:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine target branch
        id: target
        env:
          SOURCE: ${{ github.ref_name }}
        run: |
          ALL_VERSIONS=$(git branch -r \
            | grep -oE 'origin/[0-9]{4}\.[0-9]{2}\.x$' \
            | sed 's|origin/||' \
            | sort -V)

          NEXT=$(echo "$ALL_VERSIONS" | awk -v cur="$SOURCE" '
            $0 == cur { found=1; next }
            found { print; exit }
          ')

          if [ -z "$NEXT" ]; then
            TARGET="main"
          else
            TARGET="$NEXT"
          fi

          echo "Source: $SOURCE -> Target: $TARGET"
          echo "source=$SOURCE" >> "$GITHUB_OUTPUT"
          echo "target=$TARGET" >> "$GITHUB_OUTPUT"

      - name: Create PR if missing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SOURCE: ${{ steps.target.outputs.source }}
          TARGET: ${{ steps.target.outputs.target }}
        run: |
          EXISTING=$(gh pr list --base "$TARGET" --head "$SOURCE" --state open --json number --jq '.[0].number')
          if [ -n "$EXISTING" ]; then
            echo "PR #$EXISTING bereits offen, skip."
            exit 0
          fi

          gh pr create --base "$TARGET" --head "$SOURCE" \
            --title "Forward-merge ${SOURCE} -> ${TARGET}" \
            --body "Automatischer Forward-Merge-PR von \`${SOURCE}\` nach \`${TARGET}\`.

          Konflikte lokal lösen:
          \`\`\`
          git checkout ${TARGET}
          git pull
          git merge --no-commit --no-ff origin/${SOURCE}
          # Konflikte fixen
          git commit
          git push
          \`\`\`"
