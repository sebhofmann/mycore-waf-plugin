name: Maven "Snapshot" Release
on:
  release:
    types: [created]
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Determine Java version
        id: java-version
        run: |
          if [[ "${{ github.event.release.target_commitish }}" == "master" ]]; then
            echo "version=25" >> $GITHUB_OUTPUT
          else
            echo "version=21" >> $GITHUB_OUTPUT
          fi
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ steps.java-version.outputs.version }}
          distribution: 'temurin'
          server-id: 'central'
          server-username: SONATYPE_USERNAME
          server-password: SONATYPE_TOKEN
      - name: Change Versions
        run: mvn versions:set -DnewVersion=${{ github.ref_name }}-SNAPSHOT
      - name: Publish to sonatype-central with Apache Maven
        run: mvn --batch-mode deploy
        env:
          SONATYPE_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          SONATYPE_TOKEN: ${{ secrets.OSSRH_TOKEN }}
